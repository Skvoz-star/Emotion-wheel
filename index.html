<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>Emotion Wheel</title><meta name='theme-color' content='#0f172a'><meta name='apple-mobile-web-app-capable' content='yes'><meta name='apple-mobile-web-app-status-bar-style' content='black-translucent'><meta name='apple-mobile-web-app-title' content='Emotion Wheel'><link rel='manifest' href='manifest.json'><link rel='apple-touch-icon' href='icon.svg'><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Inter,sans-serif;background:radial-gradient(circle at top,#334155,#020617 70%);min-height:100vh;color:#fff;display:grid;place-items:center;padding:20px}.app{width:min(760px,100%);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(20px);border-radius:34px;padding:clamp(24px,5vw,44px);box-shadow:0 20px 70px rgba(0,0,0,.45)}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}.lang{display:flex;gap:8px}.lang button,.restart{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#fff;padding:10px 14px;border-radius:14px;cursor:pointer;font-weight:700}.lang .active,.restart{background:#fff;color:#000}h1{font-size:clamp(36px,8vw,60px);line-height:.95;letter-spacing:-.06em;margin-bottom:12px}.sub{opacity:.74;line-height:1.6;margin-bottom:28px}.q{font-size:clamp(22px,4vw,30px);margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}.opt{border:none;border-radius:22px;padding:20px;color:#fff;cursor:pointer;text-align:left;transition:.2s;min-height:92px}.opt:hover{transform:translateY(-2px) scale(1.02)}.opt b{display:block;font-size:18px}.opt small{display:block;margin-top:8px;opacity:.82;line-height:1.35}.bar{margin-top:28px;height:8px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#60a5fa,#c084fc)}.result{text-align:center}.emotion{font-size:clamp(50px,9vw,76px);font-weight:800;letter-spacing:-.06em;margin:14px 0}.desc{opacity:.8;line-height:1.7;max-width:560px;margin:0 auto}.hint{margin-top:18px;font-size:13px;opacity:.65}.back{margin-top:18px;background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer}@media(max-width:560px){.grid{grid-template-columns:1fr}}</style></head><body><main class='app' id='app'></main><script>if('serviceWorker'in navigator){navigator.serviceWorker.register('./sw.js')}const C={joy:'#65a30d',sad:'#3b82f6',fear:'#f97316',anger:'#db2777',love:'#eab308',surprise:'#14b8a6'};const D={en:{title:'Emotion Wheel',sub:'A slow path from broad feeling to precise emotion.',q:'What feels closest right now?',res:'Your emotion',restart:'Start again',back:'Back',hint:'iPhone: Share → Add to Home Screen',r:[['Joy','joy','Warmth, energy, satisfaction',[['Peaceful','Content','You feel calm and internally balanced.'],['Excited','Euphoric','You feel energized and emotionally elevated.'],['Proud','Triumphant','You feel validated and empowered.']]],['Sadness','sad','Loss, heaviness, distance',[['Lonely','Isolated','You feel emotionally disconnected.'],['Disappointed','Regretful','Something failed your expectations.'],['Powerless','Grief','You feel emotionally overwhelmed.']]],['Fear','fear','Threat, insecurity, uncertainty',[['Anxious','Worried','Your mind circles possible negative outcomes.'],['Insecure','Inferior','You feel vulnerable or not enough.'],['Overwhelmed','Helpless','Everything feels too much to manage.']]],['Anger','anger','Tension, injustice, blocked energy',[['Frustrated','Annoyed','You feel blocked and emotionally tense.'],['Betrayed','Resentful','Trust feels broken or unfair.'],['Threatened','Hostile','You feel defensive and reactive.']]],['Love','love','Closeness, care, tenderness',[['Caring','Compassionate','You feel warmth and emotional closeness.'],['Romantic','Enchanted','You feel drawn in and emotionally attached.'],['Affectionate','Fond','You feel sincere tenderness and connection.']]],['Surprise','surprise','Unexpectedness, shock, awe',[['Confused','Perplexed','You are trying to process something unexpected.'],['Inspired','Awe-struck','Something meaningful expanded your attention.'],['Shocked','Stunned','You feel frozen by intensity or suddenness.']]]]},ru:{title:'Колесо эмоций',sub:'Неспешный путь от общего чувства к точной эмоции.',q:'Что сейчас ощущается ближе всего?',res:'Твоя эмоция',restart:'Начать заново',back:'Назад',hint:'iPhone: Поделиться → На экран «Домой»',r:[['Радость','joy','Тепло, энергия, удовлетворение',[['Спокойствие','Умиротворение','Ты чувствуешь внутренний баланс и устойчивость.'],['Воодушевление','Эйфория','Ты ощущаешь эмоциональный подъём и энергию.'],['Гордость','Триумф','Ты чувствуешь признание и внутреннюю силу.']]],['Грусть','sad','Потеря, тяжесть, дистанция',[['Одиночество','Изоляция','Ты чувствуешь эмоциональную отдалённость.'],['Разочарование','Сожаление','Что-то не оправдало ожиданий.'],['Бессилие','Горе','Ты эмоционально перегружен.']]],['Страх','fear','Угроза, неуверенность, тревога',[['Тревога','Беспокойство','Мысли крутятся вокруг плохих исходов.'],['Неуверенность','Неполноценность','Ты чувствуешь уязвимость или недостаточность.'],['Перегруз','Беспомощность','Ситуация кажется слишком тяжёлой.']]],['Злость','anger','Напряжение, несправедливость',[['Фрустрация','Раздражение','Ты ощущаешь внутреннее напряжение.'],['Предательство','Обида','Доверие кажется нарушенным.'],['Угроза','Враждебность','Ты защищаешься и готов к конфронтации.']]],['Любовь','love','Близость, забота, нежность',[['Забота','Сострадание','Ты чувствуешь тепло и эмоциональную близость.'],['Романтика','Очарованность','Тебя эмоционально тянет к кому-то.'],['Нежность','Привязанность','Ты чувствуешь искреннюю связь.']]],['Удивление','surprise','Неожиданность, шок, восхищение',[['Растерянность','Недоумение','Ты пытаешься осмыслить неожиданное.'],['Вдохновение','Восхищение','Что-то красивое или важное тебя поразило.'],['Шок','Оцепенение','Ты застыл от резкости или интенсивности.']]]]} };let L=localStorage.lang||'en',S=null;const app=document.getElementById('app');function H(){return `<div class='top'><div></div><div class='lang'><button class='${L==='en'?'active':''}' onclick="setL('en')">EN</button><button class='${L==='ru'?'active':''}' onclick="setL('ru')">RU</button></div></div>`}function root(){const d=D[L];app.innerHTML=H()+`<h1>${d.title}</h1><p class='sub'>${d.sub}</p><div class='q'>${d.q}</div><div class='grid'>${d.r.map((x,i)=>`<button class='opt' style='background:${C[x[1]]}' onclick='mid(${i})'><b>${x[0]}</b><small>${x[2]}</small></button>`).join('')}</div><div class='bar'><div class='fill' style='width:33%'></div></div><div class='hint'>${d.hint}</div>`}function mid(i){S=i;const d=D[L],x=d.r[i];app.innerHTML=H()+`<h1>${x[0]}</h1><p class='sub'>${x[2]}</p><div class='grid'>${x[3].map((n,j)=>`<button class='opt' style='background:${C[x[1]]}' onclick='res(${j})'><b>${n[0]}</b><small>${n[2]}</small></button>`).join('')}</div><div class='bar'><div class='fill' style='width:66%'></div></div><button class='back' onclick='root()'>${d.back}</button>`}function res(j){const d=D[L],x=d.r[S][3][j];app.innerHTML=H()+`<section class='result'><div>${d.res}</div><div class='emotion'>${x[1]}</div><p class='desc'>${x[2]}</p><button class='restart' onclick='root()'>${d.restart}</button></section><div class='bar'><div class='fill' style='width:100%'></div></div>`}function setL(l){L=l;localStorage.lang=l;root()}root();</script></body></html>
